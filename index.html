<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PulseBoard is a full-stack analytics dashboard with authentication, charts, CRUD tools, notifications, and role-based workflows."
    />
    <title>PulseBoard Dashboard</title>
    <script>
      const storedTheme = localStorage.getItem("pulseboard-theme");
      if (storedTheme === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body class="bg-light-bg text-light-text dark:bg-dark-bg dark:text-dark-text">
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
